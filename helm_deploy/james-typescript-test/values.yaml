generic-service:
  nameOverride: james-typescript-test
  productId: "DPS9999" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  # the IRSA service account name for accessing AWS resources
  # serviceAccountName: "james-typescript-test"

  replicaCount: 4

  image:
    repository: quay.io/hmpps/james-typescript-test
    tag: app_version # override at deployment time
    port: 3000

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: james-typescript-test-cert

  livenessProbe:
    httpGet:
      path: /ping

  readinessProbe:
    httpGet:
      path: /ping

  # Environment variables to load into the deployment
  env:
    NODE_ENV: "production"
    REDIS_ENABLED: "true"
    REDIS_TLS_ENABLED: "true"
    TOKEN_VERIFICATION_ENABLED: "true"
    APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=$(APPINSIGHTS_INSTRUMENTATIONKEY);IngestionEndpoint=https://northeurope-0.in.applicationinsights.azure.com/;LiveEndpoint=https://northeurope.livediagnostics.monitor.azure.com/"
    AUDIT_SQS_REGION: "eu-west-2"
    AUDIT_SERVICE_NAME: "UNASSIGNED" # Your audit service name

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    james-dev:
      API_CLIENT_ID: "changeme",
      API_CLIENT_SECRET: "changeme",
      APPINSIGHTS_INSTRUMENTATIONKEY: "b44af8fc-1647-443d-8cea-55c5cfbd4518",
      SESSION_SECRET: "2e4a816e91bf9d64f967",
      SYSTEM_CLIENT_ID: "changeme",
      SYSTEM_CLIENT_SECRET: "changeme"
    elasticache-redis:
      REDIS_HOST: "primary_endpoint_address"
      REDIS_AUTH_TOKEN: "auth_token"
    #sqs-hmpps-audit-secret:
    #  AUDIT_SQS_QUEUE_URL: "sqs_queue_url"
    #  AUDIT_SQS_QUEUE_NAME: "sqs_queue_name"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: james-typescript-test
