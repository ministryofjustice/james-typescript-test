name: Security npm dependency check - main

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * MON-FRI" # Every weekday at 05:35 UTC

jobs:
  security-npm-depencency-check:
    name: Project security npm dependency check
#    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@0.1
    uses: /.github/workflows/security_npm_dependency_TEST.yml
    with:
      channel_id: ${{ vars.SLACK_CHANNEL_ID }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      