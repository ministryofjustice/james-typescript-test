name: Security trivy dependency check

on:
  workflow_call:
    inputs:
      subproject:
        required: false
        type: string
      channel_id:
        required: false
        type: string
    secrets:
      SLACK_BOT_TOKEN:
        description: Slack bot token
        required: true

permissions:
  contents: read

jobs:
  security-trivy-check:
    name: Security trivy dependency check
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    env:
      parent_directory: ${{ github.event.repository.name == '' && '.' || github.event.repository.name }}
    steps:
    - uses: actions/checkout@v4
    - name: Trivy Image Vulnerability Scanner
      id: trivy
      uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
      with:
        image-ref: 'quay.io/hmpps/${{ github.event.repository.name }}:latest'
        severity: 'HIGH,CRITICAL'
        ignore-unfixed: true
        skip-files: /app/agent.jar
        format: 'sarif'
        output: 'trivy-results.sarif'
        # exit-code: 1
        limit-severities-for-sarif: true
    - uses: ministryofjustice/hmpps-github-actions/.github/actions/security_trivy_reports@0.1 # WORKFLOW_VERSION
      if: success()  || steps.trivy.conclusion == 'failure'
      with:
        channel_id: ${{ inputs.channel_id}}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    - uses: actions/upload-artifact@v3
      with:
        name: trivy-results-${{ github.event.repository.name }}
        path: build/reports/trivy-results.sarif
    - name: Slack failure notification
      uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
      if: failure()
      with:
        channel-id: ${{ inputs.channel_id}}
        payload: |
          { "text": "Trivy scan failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":no_entry: Failed GitHub Action:"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job:*\n${{ github.job }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Repo:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Project:*\n${{ github.event.repository.name }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
